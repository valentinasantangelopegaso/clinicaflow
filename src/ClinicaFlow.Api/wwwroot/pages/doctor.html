<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClinicaFlow – Area Medico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/common.css" rel="stylesheet" />
  <link href="/css/doctor.css" rel="stylesheet" />
</head>
<body>
  <!-- Navbar comune -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/index.html">ClinicaFlow</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/backoffice.html">Back Office</a></li>
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="/pages/doctor.html">Area Medico</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/patient.html">Area Paziente</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Vista login -->
  <main class="container py-5" id="doctor-login-view">
    <div class="login-card">
      <h1 class="h4 text-center">Accesso Medico</h1>
      <div id="doctor-login-alert"></div>
      <form id="doctor-login-form">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" name="username" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" required />
        </div>
        <button type="submit" class="btn btn-primary w-100">Accedi</button>
      </form>
    </div>
  </main>

  <!-- Dashboard medico -->
  <main class="container py-4 d-none" id="doctor-dashboard-view">
    <div class="doctor-header d-flex justify-content-between align-items-center">
      <h1 class="h4 mb-0">Area Medico</h1>
      <div class="d-flex align-items-center gap-3">
        <span>Dr. <strong id="doctor-name"></strong></span>
        <button class="btn btn-outline-light btn-sm" id="doctor-logout-btn">Logout</button>
      </div>
    </div>
    <!-- Appointments -->
    <h2 class="h5 mb-2">Appuntamenti</h2>
    <div id="doctor-appointments-alert"></div>
    <div class="table-responsive">
      <table class="table table-striped table-sm" id="doctor-appointments-table">
        <thead>
          <tr>
            <th>Data & Ora</th>
            <th>Paziente</th>
            <th>Stato</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
    <!-- Reports -->
    <h2 class="h5 mt-4 mb-2">Referti</h2>
    <div id="doctor-reports-alert"></div>
    <div class="table-responsive">
      <table class="table table-striped table-sm" id="doctor-reports-table">
        <thead>
          <tr>
            <th>Data Appuntamento</th>
            <th>Paziente</th>
            <th>Diagnosi</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </main>

  <!-- Modale gestione referto -->
  <div class="modal fade" id="manageReportModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Referto appuntamento</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div id="manage-report-alert"></div>
          <form id="manage-report-form">
            <input type="hidden" name="appointmentId" id="report-appointment-id" />
            <div class="mb-3">
              <label class="form-label">Diagnosi</label>
              <input type="text" class="form-control" name="diagnosis" id="report-diagnosis" required />
            </div>
            <div class="mb-3">
              <label class="form-label">Descrizione</label>
              <textarea class="form-control" name="description" id="report-description" rows="4" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Salva Referto</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/common.js"></script>
  <script src="/js/doctor.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
