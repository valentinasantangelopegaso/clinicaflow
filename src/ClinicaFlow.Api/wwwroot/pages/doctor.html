<!DOCTYPE html>
<!--
  Area Medico

  Questa pagina consente ai medici di accedere con il proprio codice
  fiscale per visualizzare le informazioni personali, gli
  appuntamenti a loro assegnati e gestire i referti associati. Gli
  utenti non autenticati visualizzano solo il modulo di accesso. Una
  volta effettuato l'accesso, vengono caricati gli appuntamenti del
  medico e i referti già registrati. È possibile completare o
  annullare appuntamenti pianificati e creare o modificare un referto
  per gli appuntamenti completati.
-->
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClinicaFlow - Area Medico</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/doctor.css" />
  </head>
  <body>
    <!-- Barra di navigazione -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="../index.html">ClinicaFlow</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="backoffice.html">Back Office</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#"
                >Area Medico</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link" href="patient.html">Area Paziente</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container mt-4">
      <!-- Sezione accesso -->
      <div id="loginSection">
        <h1 class="doctor-header mb-3">Accesso Medico</h1>
        <div class="mb-3">
          <label for="doctorTaxCode" class="form-label">Codice fiscale</label>
          <input
            type="text"
            id="doctorTaxCode"
            class="form-control"
            maxlength="16"
            placeholder="Inserisci il tuo codice fiscale"
          />
        </div>
        <button id="doctorLoginBtn" class="btn btn-primary">
          Accedi
        </button>
        <div id="doctorLoginAlert" class="mt-3"></div>
      </div>
      <!-- Dashboard medico, inizialmente nascosta -->
      <div id="doctorDashboard" class="d-none">
        <h1 class="doctor-header">Benvenuto, <span id="doctorName"></span></h1>
        <p class="mb-4">
          Specializzazione:
          <strong id="doctorSpecialty"></strong>
        </p>
        <!-- Appuntamenti del medico -->
        <h2 class="h4 mt-4">Appuntamenti</h2>
        <div id="doctorAppointmentsAlert" class="mb-2"></div>
        <div class="table-responsive">
          <table id="doctorAppointmentsTable" class="table table-striped">
            <thead>
              <tr>
                <th>#</th>
                <th>Paziente</th>
                <th>Data e ora</th>
                <th>Stato</th>
                <th>Note</th>
                <th>Azioni</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <!-- Sezione referti -->
        <h2 class="h4 mt-4">Referti</h2>
        <div id="doctorReportsAlert" class="mb-2"></div>
        <div class="table-responsive">
          <table id="doctorReportsTable" class="table table-striped">
            <thead>
              <tr>
                <th>#</th>
                <th>Paziente</th>
                <th>Appuntamento</th>
                <th>Diagnosi</th>
                <th>Terapia</th>
                <th>Note</th>
                <th>Creato il</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <!-- Editor referto -->
        <div id="reportEditor" class="card mt-4 d-none">
          <div class="card-body">
            <h3 class="h5">Gestione Referto</h3>
            <p class="small text-muted mb-3">
              Appuntamento: <span id="reportAppointmentInfo"></span>
            </p>
            <form id="doctorReportForm">
              <div class="mb-3">
                <label for="diagnosis" class="form-label">Diagnosi</label>
                <input
                  type="text"
                  id="diagnosis"
                  name="diagnosis"
                  class="form-control"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="therapy" class="form-label">Terapia</label>
                <input
                  type="text"
                  id="therapy"
                  name="therapy"
                  class="form-control"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="notes" class="form-label">Note</label>
                <textarea
                  id="notes"
                  name="notes"
                  class="form-control"
                  rows="3"
                ></textarea>
              </div>
              <button type="submit" class="btn btn-success me-2">
                Salva
              </button>
              <button
                type="button"
                class="btn btn-secondary"
                id="reportCancelBtn"
              >
                Annulla
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/doctor.js"></script>
  </body>
</html>
