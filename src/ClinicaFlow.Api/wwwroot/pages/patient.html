<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ClinicaFlow – Area Paziente</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="/css/common.css" rel="stylesheet" />
  <link href="/css/patient.css" rel="stylesheet" />
</head>
<body>
  <!-- Navbar comune -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="/index.html">ClinicaFlow</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#navbarNav"
        aria-controls="navbarNav"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/backoffice.html">Back Office</a></li>
          <li class="nav-item"><a class="nav-link" href="/pages/doctor.html">Area Medico</a></li>
          <li class="nav-item"><a class="nav-link active" aria-current="page" href="/pages/patient.html">Area Paziente</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Vista login -->
  <main class="container py-5" id="patient-login-view">
    <div class="login-card">
      <h1 class="h4 text-center">Accesso Paziente</h1>
      <div id="patient-login-alert"></div>
      <form id="patient-login-form">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <input type="text" class="form-control" name="username" required />
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" name="password" required />
        </div>
        <button type="submit" class="btn btn-primary w-100">Accedi</button>
      </form>
    </div>
  </main>

  <!-- Dashboard paziente -->
  <main class="container py-4 d-none" id="patient-dashboard-view">
    <div class="patient-header d-flex justify-content-between align-items-center">
      <h1 class="h4 mb-0">Area Paziente</h1>
      <div class="d-flex align-items-center gap-3">
        <span><strong id="patient-name"></strong></span>
        <button class="btn btn-outline-light btn-sm" id="patient-logout-btn">Logout</button>
      </div>
    </div>
    <h2 class="h5 mb-2">Appuntamenti</h2>
    <div id="patient-appointments-alert"></div>
    <div class="row g-4">
      <div class="col-lg-6">
        <div class="table-responsive">
          <table class="table table-striped table-sm" id="patient-appointments-table">
            <thead>
              <tr>
                <th>Data & Ora</th>
                <th>Medico</th>
                <th>Stato</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card h-100 shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Referto selezionato</h5>
            <p class="card-text" id="patient-report-details">Seleziona un appuntamento per visualizzare il referto.</p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="/js/common.js"></script>
  <script src="/js/patient.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
