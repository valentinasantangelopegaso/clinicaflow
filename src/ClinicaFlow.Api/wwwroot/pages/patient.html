<!DOCTYPE html>
<!--
  Area Paziente

  Questa pagina consente ai pazienti di accedere con il proprio codice
  fiscale e visualizzare le proprie informazioni anagrafiche, gli
  appuntamenti prenotati e i referti medici disponibili. Non è
  possibile modificare i dati o creare nuovi appuntamenti: il
  paziente può solo consultare il proprio storico e le informazioni
  relative alle visite effettuate.
-->
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ClinicaFlow – Area Paziente</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/common.css" />
    <link rel="stylesheet" href="../css/patient.css" />
  </head>
  <body>
    <!-- Barra di navigazione -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container-fluid">
        <a class="navbar-brand" href="../index.html">ClinicaFlow</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="backoffice.html">Back Office</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="doctor.html">Area Medico</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="#"
                >Area Paziente</a
              >
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <div class="container mt-4">
      <!-- Sezione accesso -->
      <div id="patientLoginSection">
        <h1 class="patient-header mb-3">Accesso Paziente</h1>
        <div class="mb-3">
          <label for="patientTaxCode" class="form-label">Codice fiscale</label>
          <input
            type="text"
            id="patientTaxCode"
            class="form-control"
            maxlength="16"
            placeholder="Inserisci il tuo codice fiscale"
          />
        </div>
        <button id="patientLoginBtn" class="btn btn-primary">
          Accedi
        </button>
        <div id="patientLoginAlert" class="mt-3"></div>
      </div>
      <!-- Dashboard paziente, inizialmente nascosta -->
      <div id="patientDashboard" class="d-none">
        <h1 class="patient-header">Benvenuto, <span id="patientName"></span></h1>
        <p>
          Data di nascita: <strong id="patientBirthDate"></strong><br />
          Email: <strong id="patientEmail"></strong><br />
          Telefono: <strong id="patientPhone"></strong>
        </p>
        <!-- Appuntamenti del paziente -->
        <h2 class="h4 mt-4">I tuoi appuntamenti</h2>
        <div id="patientAppointmentsAlert" class="mb-2"></div>
        <div class="table-responsive">
          <table id="patientAppointmentsTable" class="table table-striped">
            <thead>
              <tr>
                <th>#</th>
                <th>Medico</th>
                <th>Data e ora</th>
                <th>Stato</th>
                <th>Note</th>
                <th>Referto</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
        <!-- Dettaglio referto, nascosto finché non selezionato -->
        <div id="patientReportDetails" class="card mt-4 d-none">
          <div class="card-body">
            <h3 class="h5">Referto medico</h3>
            <p class="small text-muted mb-3">
              Appuntamento: <span id="patientReportAppointmentInfo"></span>
            </p>
            <ul class="list-group list-group-flush mb-3">
              <li class="list-group-item">
                <strong>Diagnosi:</strong> <span id="patientReportDiagnosis"></span>
              </li>
              <li class="list-group-item">
                <strong>Terapia:</strong> <span id="patientReportTherapy"></span>
              </li>
              <li class="list-group-item">
                <strong>Note:</strong> <span id="patientReportNotes"></span>
              </li>
              <li class="list-group-item">
                <strong>Creato il:</strong> <span id="patientReportCreatedAt"></span>
              </li>
            </ul>
            <button id="patientReportCloseBtn" class="btn btn-secondary">
              Chiudi
            </button>
          </div>
        </div>
      </div>
    </div>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/common.js"></script>
    <script src="../js/patient.js"></script>
  </body>
</html>
